<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c4502a"/>
      <stop offset="0.4" stop-color="#e8803a"/>
      <stop offset="0.7" stop-color="#f6b84a"/>
      <stop offset="1" stop-color="#fde08a"/>
    </linearGradient>
    <radialGradient id="sun19" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4d0"/><stop offset="0.55" stop-color="#ffd86a"/><stop offset="0.8" stop-color="#ffb84a" stop-opacity="0.5"/><stop offset="1" stop-color="#ffb84a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ground19a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#caa052"/><stop offset="1" stop-color="#a87a36"/>
    </linearGradient>
    <linearGradient id="ground19b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a5e2a"/><stop offset="1" stop-color="#5a3c1a"/>
    </linearGradient>
    <linearGradient id="water19" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffd07a"/><stop offset="1" stop-color="#c4863a"/>
    </linearGradient>
    <filter id="haze19" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky19)"/>

  <!-- big sun -->
  <circle cx="800" cy="560" r="420" fill="url(#sun19)"/>
  <circle cx="800" cy="560" r="170" fill="#ffe488"/>
  <!-- heat band -->
  <rect x="0" y="600" width="1600" height="40" fill="#ffd87a" opacity="0.4" filter="url(#haze19)"/>

  <!-- distant flat horizon land -->
  <rect x="0" y="640" width="1600" height="40" fill="#b08a44" opacity="0.6"/>
  <!-- savanna ground -->
  <path d="M0 660 Q400 640 800 660 Q1200 680 1600 660 L1600 1000 L0 1000 Z" fill="url(#ground19a)"/>
  <path d="M0 780 Q400 760 800 780 Q1200 800 1600 780 L1600 1000 L0 1000 Z" fill="url(#ground19b)"/>

  <!-- watering hole reflecting sun -->
  <ellipse cx="800" cy="850" rx="360" ry="70" fill="url(#water19)"/>
  <ellipse cx="800" cy="850" rx="360" ry="70" fill="none" stroke="#8a5e2a" stroke-width="3"/>
  <ellipse cx="800" cy="838" rx="120" ry="14" fill="#fff0b0" opacity="0.6"/>

  <!-- grass tufts (dark silhouettes) -->
  <g stroke="#3a2810" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.7">
    <path d="M120 700 q-4 -20 -10 -30 M126 700 q0 -22 4 -34 M132 700 q6 -18 14 -26"/>
    <path d="M1440 700 q-4 -20 -10 -30 M1446 700 q0 -22 4 -34 M1452 700 q6 -18 14 -26"/>
  </g>

  <!-- acacia trees (silhouettes) -->
  <g fill="#2a1c0e">
    <!-- big acacia right -->
    <g transform="translate(1240 380)">
      <path d="M0 280 L-6 90 Q-30 70 -50 40 M0 90 Q24 70 50 36 M0 160 Q-24 140 -44 120 M0 200 Q26 184 48 166" stroke="#2a1c0e" stroke-width="10" fill="none"/>
      <rect x="-10" y="90" width="20" height="190"/>
      <path d="M-160 40 Q0 -60 160 40 Q120 70 0 60 Q-120 70 -160 40 Z"/>
      <ellipse cx="-90" cy="44" rx="60" ry="20"/><ellipse cx="90" cy="44" rx="60" ry="20"/>
    </g>
    <!-- smaller acacia left -->
    <g transform="translate(280 480) scale(0.7)">
      <rect x="-10" y="90" width="20" height="200"/>
      <path d="M0 90 Q-24 70 -50 40 M0 90 Q24 70 50 36 M0 150 Q-24 130 -44 110" stroke="#2a1c0e" stroke-width="10" fill="none"/>
      <path d="M-150 44 Q0 -50 150 44 Q110 72 0 62 Q-110 72 -150 44 Z"/>
    </g>
    <!-- distant tiny tree -->
    <g transform="translate(540 600) scale(0.4)">
      <rect x="-10" y="90" width="20" height="180"/>
      <path d="M-140 44 Q0 -46 140 44 Q100 70 0 60 Q-100 70 -140 44 Z"/>
    </g>
  </g>

  <!-- giraffes -->
  <g fill="#1f1408">
    <g transform="translate(620 520)">
      <!-- body -->
      <ellipse cx="0" cy="120" rx="56" ry="34"/>
      <!-- neck -->
      <path d="M30 100 L60 -40 L86 -40 L52 110 Z"/>
      <!-- head -->
      <path d="M58 -40 Q40 -64 64 -70 L96 -64 Q104 -52 88 -44 Z"/>
      <!-- ossicones -->
      <line x1="70" y1="-66" x2="66" y2="-84" stroke="#1f1408" stroke-width="4"/><line x1="84" y1="-64" x2="82" y2="-82" stroke="#1f1408" stroke-width="4"/>
      <!-- legs -->
      <rect x="-44" y="148" width="10" height="100"/><rect x="-18" y="150" width="10" height="100"/><rect x="20" y="150" width="10" height="100"/><rect x="44" y="148" width="10" height="100"/>
      <!-- tail -->
      <path d="M-54 110 Q-78 150 -70 190" stroke="#1f1408" stroke-width="5" fill="none"/>
    </g>
    <g transform="translate(720 560) scale(0.8)">
      <ellipse cx="0" cy="120" rx="52" ry="32"/>
      <path d="M28 100 L56 -40 L80 -40 L48 110 Z"/>
      <path d="M54 -40 Q38 -62 60 -68 L90 -62 Q98 -50 82 -42 Z"/>
      <line x1="66" y1="-64" x2="62" y2="-82" stroke="#1f1408" stroke-width="4"/><line x1="80" y1="-62" x2="78" y2="-80" stroke="#1f1408" stroke-width="4"/>
      <rect x="-40" y="148" width="9" height="94"/><rect x="-16" y="150" width="9" height="94"/><rect x="18" y="150" width="9" height="94"/><rect x="40" y="148" width="9" height="94"/>
    </g>
  </g>

  <!-- elephant -->
  <g fill="#1a1208" transform="translate(1020 700)">
    <ellipse cx="0" cy="0" rx="90" ry="60"/>
    <!-- head -->
    <circle cx="86" cy="-10" r="44"/>
    <!-- ear -->
    <path d="M70 -20 Q40 -50 30 -10 Q44 16 74 6 Z"/>
    <!-- trunk -->
    <path d="M120 0 Q150 30 140 80 Q136 110 120 110 Q126 80 110 50 Q100 26 104 6 Z"/>
    <!-- tusk -->
    <path d="M112 24 Q132 40 130 60" stroke="#3a2c18" stroke-width="6" fill="none"/>
    <!-- legs -->
    <rect x="-70" y="50" width="26" height="80" rx="6"/><rect x="-24" y="54" width="26" height="80" rx="6"/><rect x="30" y="54" width="26" height="78" rx="6"/><rect x="62" y="50" width="24" height="78" rx="6"/>
    <!-- tail -->
    <path d="M-88 -10 Q-118 10 -110 50" stroke="#1a1208" stroke-width="6" fill="none"/>
  </g>

  <!-- birds across sun -->
  <g stroke="#2a1c0e" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.8">
    <path d="M520 300 q14 -12 28 0 q14 -12 28 0"/><path d="M600 340 q11 -9 22 0 q11 -9 22 0"/>
    <path d="M460 360 q9 -8 18 0 q9 -8 18 0"/><path d="M1080 320 q12 -10 24 0 q12 -10 24 0"/><path d="M1160 360 q10 -8 20 0 q10 -8 20 0"/>
  </g>
</svg>
