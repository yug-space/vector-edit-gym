<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfe0ec"/>
      <stop offset="0.5" stop-color="#e6d0e0"/>
      <stop offset="1" stop-color="#fbe6ee"/>
    </linearGradient>
    <linearGradient id="fuji10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a9ec4"/><stop offset="1" stop-color="#aebdd8"/>
    </linearGradient>
    <linearGradient id="pond10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fd0d8"/><stop offset="1" stop-color="#4a8a9a"/>
    </linearGradient>
    <radialGradient id="blossom10" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#ffdbe8"/><stop offset="0.6" stop-color="#ffb0cc"/><stop offset="1" stop-color="#f78aae"/>
    </radialGradient>
    <filter id="soft10" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="8"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky10)"/>

  <!-- Mt Fuji -->
  <path d="M820 540 L1080 200 Q1120 170 1160 200 L1420 540 Z" fill="url(#fuji10)" opacity="0.7"/>
  <path d="M1050 240 L1120 200 L1190 240 Q1120 280 1050 240 Z" fill="#f4f8ff"/>
  <path d="M1000 320 L1240 320 Q1180 360 1120 350 Q1060 360 1000 320 Z" fill="#f4f8ff" opacity="0.7"/>

  <!-- distant hills -->
  <path d="M0 520 Q300 470 600 510 Q900 550 1600 500 L1600 600 L0 600 Z" fill="#9ab06a" opacity="0.5"/>

  <!-- ground -->
  <path d="M0 600 Q400 560 800 600 Q1200 640 1600 600 L1600 1000 L0 1000 Z" fill="#7a9a52"/>
  <path d="M0 700 Q400 680 800 700 Q1200 720 1600 700 L1600 1000 L0 1000 Z" fill="#688a44"/>

  <!-- koi pond -->
  <ellipse cx="800" cy="860" rx="440" ry="110" fill="url(#pond10)"/>
  <ellipse cx="800" cy="860" rx="440" ry="110" fill="none" stroke="#3a6a72" stroke-width="4"/>
  <!-- ripples -->
  <g fill="none" stroke="#cdeaf0" stroke-width="2" opacity="0.6">
    <ellipse cx="700" cy="850" rx="60" ry="14"/><ellipse cx="900" cy="880" rx="80" ry="18"/>
  </g>
  <!-- koi -->
  <g>
    <g transform="translate(680 850)"><ellipse rx="30" ry="14" fill="#ff7a3c"/><polygon points="-28,0 -46,-12 -46,12" fill="#ff5a1a"/><ellipse rx="30" ry="14" fill="#fff" opacity="0.3"/></g>
    <g transform="translate(900 880) rotate(20)"><ellipse rx="26" ry="12" fill="#ffffff"/><polygon points="-24,0 -40,-10 -40,10" fill="#e8e8e8"/><circle cx="-4" r="6" fill="#ff5a1a"/></g>
    <g transform="translate(820 900) rotate(-10)"><ellipse rx="22" ry="10" fill="#ff9a4c"/><polygon points="-20,0 -34,-8 -34,8" fill="#ff7a2c"/></g>
  </g>
  <!-- lily pads -->
  <g fill="#3a7a4a"><ellipse cx="600" cy="900" rx="26" ry="10"/><ellipse cx="1000" cy="840" rx="22" ry="9"/></g>

  <!-- red arched bridge -->
  <g transform="translate(420 760)">
    <path d="M0 60 Q160 -40 320 60" fill="none" stroke="#c0392b" stroke-width="20"/>
    <path d="M0 60 Q160 -40 320 60" fill="none" stroke="#9a2a1e" stroke-width="6" opacity="0.5"/>
    <g stroke="#c0392b" stroke-width="6">
      <line x1="40" y1="38" x2="40" y2="80"/><line x1="120" y1="6" x2="120" y2="48"/><line x1="200" y1="6" x2="200" y2="48"/><line x1="280" y1="38" x2="280" y2="80"/>
    </g>
    <path d="M40 38 Q160 -56 280 38" fill="none" stroke="#d4503e" stroke-width="5"/>
  </g>

  <!-- pagoda -->
  <g transform="translate(1080 560)">
    <rect x="-40" y="120" width="80" height="120" fill="#9a3a2e"/>
    <!-- tiers -->
    <g fill="#7a2a20">
      <path d="M-90 120 L90 120 L60 80 L-60 80 Z"/>
      <path d="M-80 60 L80 60 L52 24 L-52 24 Z"/>
      <path d="M-70 8 L70 8 L46 -24 L-46 -24 Z"/>
      <path d="M-58 -40 L58 -40 L36 -70 L-36 -70 Z"/>
    </g>
    <g fill="#c0503e">
      <rect x="-56" y="80" width="112" height="14"/><rect x="-48" y="24" width="96" height="12"/><rect x="-42" y="-24" width="84" height="12"/><rect x="-32" y="-70" width="64" height="10"/>
    </g>
    <!-- finial -->
    <rect x="-3" y="-110" width="6" height="40" fill="#d4a02a"/>
    <circle cx="0" cy="-112" r="8" fill="#d4a02a"/>
    <!-- door + windows -->
    <rect x="-16" y="160" width="32" height="80" fill="#3a1a14"/>
    <rect x="-30" y="40" width="18" height="14" fill="#3a1a14"/><rect x="12" y="40" width="18" height="14" fill="#3a1a14"/>
  </g>

  <!-- stone lanterns -->
  <g fill="#9a9a90">
    <g transform="translate(360 820)"><rect x="-10" y="0" width="20" height="40"/><rect x="-18" y="-26" width="36" height="26" rx="4"/><polygon points="-22,-26 0,-50 22,-26" fill="#8a8a80"/><rect x="-8" y="-22" width="16" height="14" fill="#ffd27a"/></g>
    <g transform="translate(1300 820)"><rect x="-10" y="0" width="20" height="40"/><rect x="-18" y="-26" width="36" height="26" rx="4"/><polygon points="-22,-26 0,-50 22,-26" fill="#8a8a80"/><rect x="-8" y="-22" width="16" height="14" fill="#ffd27a"/></g>
  </g>

  <!-- cherry blossom trees -->
  <g>
    <g transform="translate(200 500)">
      <path d="M0 360 Q-20 220 -60 160 M0 360 Q10 240 60 170 M0 360 L0 200" stroke="#5a3a2a" stroke-width="16" fill="none"/>
      <g filter="url(#soft10)">
        <circle cx="-80" cy="140" r="70" fill="url(#blossom10)"/><circle cx="40" cy="120" r="80" fill="url(#blossom10)"/>
        <circle cx="-20" cy="80" r="76" fill="url(#blossom10)"/><circle cx="90" cy="180" r="60" fill="url(#blossom10)"/><circle cx="-100" cy="220" r="56" fill="url(#blossom10)"/>
      </g>
    </g>
    <g transform="translate(1440 540) scale(0.8)">
      <path d="M0 360 Q-20 220 -60 160 M0 360 Q10 240 60 170" stroke="#5a3a2a" stroke-width="16" fill="none"/>
      <g filter="url(#soft10)">
        <circle cx="-70" cy="150" r="64" fill="url(#blossom10)"/><circle cx="40" cy="130" r="70" fill="url(#blossom10)"/><circle cx="-10" cy="90" r="68" fill="url(#blossom10)"/>
      </g>
    </g>
  </g>

  <!-- falling petals -->
  <g fill="#ffb8d2" opacity="0.85">
    <ellipse cx="400" cy="300" rx="6" ry="3" transform="rotate(30 400 300)"/><ellipse cx="600" cy="400" rx="5" ry="2.5" transform="rotate(-20 600 400)"/>
    <ellipse cx="800" cy="340" rx="6" ry="3" transform="rotate(40 800 340)"/><ellipse cx="1000" cy="440" rx="5" ry="2.5" transform="rotate(-30 1000 440)"/>
    <ellipse cx="520" cy="540" rx="6" ry="3" transform="rotate(20 520 540)"/><ellipse cx="900" cy="560" rx="5" ry="2.5" transform="rotate(-40 900 560)"/>
    <ellipse cx="300" cy="640" rx="6" ry="3" transform="rotate(50 300 640)"/><ellipse cx="1180" cy="600" rx="5" ry="2.5" transform="rotate(-20 1180 600)"/>
  </g>
</svg>
