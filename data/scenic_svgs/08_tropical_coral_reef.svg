<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="water08" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fe4f0"/>
      <stop offset="0.4" stop-color="#33b8d8"/>
      <stop offset="0.75" stop-color="#1a7aae"/>
      <stop offset="1" stop-color="#0e4a78"/>
    </linearGradient>
    <linearGradient id="ray08" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eafdff" stop-opacity="0.6"/><stop offset="1" stop-color="#eafdff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="sand08" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0e2b0"/><stop offset="1" stop-color="#d8c488"/>
    </linearGradient>
    <filter id="rayblur08" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="14"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#water08)"/>

  <!-- sun rays -->
  <g filter="url(#rayblur08)">
    <polygon points="200,-40 280,-40 480,800 120,800" fill="url(#ray08)"/>
    <polygon points="640,-40 720,-40 860,800 540,800" fill="url(#ray08)" opacity="0.7"/>
    <polygon points="1120,-40 1220,-40 1320,800 1020,800" fill="url(#ray08)" opacity="0.6"/>
  </g>

  <!-- bubbles -->
  <g fill="none" stroke="#eafdff" stroke-width="1.5" opacity="0.6">
    <circle cx="300" cy="300" r="6"/><circle cx="320" cy="260" r="4"/><circle cx="312" cy="220" r="7"/>
    <circle cx="1200" cy="360" r="5"/><circle cx="1216" cy="320" r="3"/><circle cx="1208" cy="280" r="6"/>
  </g>

  <!-- sea turtle -->
  <g transform="translate(560 360)">
    <ellipse cx="0" cy="0" rx="86" ry="64" fill="#3a6a4a"/>
    <ellipse cx="0" cy="0" rx="86" ry="64" fill="none" stroke="#27543a" stroke-width="3"/>
    <g stroke="#1f4630" stroke-width="2.5" fill="#4a7a56">
      <path d="M-30 -40 L-10 -10 L-40 0 Z"/><path d="M30 -40 L10 -10 L40 0 Z"/>
      <path d="M-40 10 L-12 8 L-26 44 Z"/><path d="M40 10 L12 8 L26 44 Z"/><path d="M-12 -8 L12 -8 L8 24 L-8 24 Z"/>
    </g>
    <ellipse cx="-84" cy="-6" rx="26" ry="20" fill="#3a6a4a"/>
    <circle cx="-96" cy="-10" r="4" fill="#1a2a1a"/>
    <path d="M70 -40 Q110 -60 120 -30 Q90 -34 70 -20 Z" fill="#3a6a4a"/>
    <path d="M70 40 Q110 60 120 30 Q90 34 70 20 Z" fill="#3a6a4a"/>
    <path d="M-40 60 Q-30 96 -64 92 Q-52 70 -50 56 Z" fill="#3a6a4a"/>
  </g>

  <!-- fish school -->
  <g fill="#ffb13c">
    <g transform="translate(960 260)"><ellipse rx="22" ry="11"/><polygon points="-20,0 -36,-10 -36,10" fill="#ff8c1a"/><circle cx="12" cy="-2" r="2.5" fill="#1a2a1a"/></g>
    <g transform="translate(1010 290)"><ellipse rx="18" ry="9"/><polygon points="-16,0 -30,-8 -30,8" fill="#ff8c1a"/><circle cx="10" cy="-2" r="2" fill="#1a2a1a"/></g>
    <g transform="translate(1050 250)"><ellipse rx="20" ry="10"/><polygon points="-18,0 -32,-9 -32,9" fill="#ff8c1a"/><circle cx="11" cy="-2" r="2" fill="#1a2a1a"/></g>
    <g transform="translate(1000 340)"><ellipse rx="16" ry="8"/><polygon points="-14,0 -26,-7 -26,7" fill="#ff8c1a"/></g>
  </g>
  <!-- blue tang -->
  <g transform="translate(420 540)">
    <ellipse rx="30" ry="20" fill="#2a7adf"/><polygon points="-28,0 -48,-16 -48,16" fill="#1a4aaf"/>
    <ellipse rx="30" ry="20" fill="none" stroke="#ffe14d" stroke-width="3"/><circle cx="16" cy="-4" r="3" fill="#1a2a1a"/>
  </g>
  <!-- clownfish near anemone -->
  <g transform="translate(1180 700)">
    <ellipse rx="20" ry="12" fill="#ff7a1a"/><polygon points="-18,0 -32,-9 -32,9" fill="#e85a0a"/>
    <rect x="-4" y="-12" width="6" height="24" fill="#fff"/><rect x="-14" y="-10" width="5" height="20" fill="#fff"/><circle cx="11" cy="-2" r="2.5" fill="#1a2a1a"/>
  </g>

  <!-- sandy floor -->
  <path d="M0 1000 L0 820 Q300 780 600 820 Q900 860 1200 810 Q1400 780 1600 820 L1600 1000 Z" fill="url(#sand08)"/>

  <!-- coral structures -->
  <g>
    <!-- brain coral -->
    <ellipse cx="200" cy="830" rx="90" ry="50" fill="#e07a9a"/>
    <g stroke="#b85578" stroke-width="3" fill="none"><path d="M140 830 Q200 800 260 830"/><path d="M150 850 Q200 824 250 850"/><path d="M160 815 Q200 800 240 815"/></g>
    <!-- branching coral -->
    <g fill="#ff8c5a">
      <path d="M420 880 q-10 -90 10 -120 q10 30 0 120 Z"/>
      <path d="M440 880 q-4 -120 30 -150 q-20 50 -10 150 Z"/>
      <path d="M400 880 q-14 -80 -10 -110 q24 30 24 110 Z"/>
    </g>
    <!-- purple fan coral -->
    <g transform="translate(1080 840)" fill="none" stroke="#9a5ad0" stroke-width="4">
      <path d="M0 0 Q-40 -80 -20 -160 M0 0 Q-10 -90 10 -170 M0 0 Q40 -80 30 -160 M0 0 Q-60 -60 -70 -120 M0 0 Q60 -60 70 -120"/>
    </g>
    <!-- tube coral -->
    <g fill="#f0c84a"><ellipse cx="700" cy="850" rx="14" ry="44"/><ellipse cx="730" cy="858" rx="12" ry="36"/><ellipse cx="676" cy="858" rx="11" ry="32"/></g>
    <!-- green coral -->
    <g fill="#3ac88a"><path d="M1350 880 q-12 -90 8 -130 q14 40 6 130 Z"/><path d="M1380 880 q-6 -100 26 -130 q-14 50 -8 130 Z"/></g>
  </g>

  <!-- anemones -->
  <g transform="translate(1180 840)">
    <ellipse rx="40" ry="20" fill="#c84a7a"/>
    <g stroke="#e07aa0" stroke-width="4" stroke-linecap="round">
      <line x1="-30" y1="0" x2="-36" y2="-30"/><line x1="-15" y1="0" x2="-18" y2="-40"/><line x1="0" y1="0" x2="0" y2="-44"/>
      <line x1="15" y1="0" x2="18" y2="-40"/><line x1="30" y1="0" x2="36" y2="-30"/><line x1="-22" y1="0" x2="-28" y2="-36"/><line x1="22" y1="0" x2="28" y2="-36"/>
    </g>
  </g>

  <!-- seaweed -->
  <g stroke="#2a8a5a" stroke-width="6" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M900 880 Q880 800 910 740 Q940 680 920 620"/>
    <path d="M930 880 Q950 810 925 760 Q905 700 930 640"/>
  </g>

  <!-- starfish on sand -->
  <g transform="translate(640 900)" fill="#ff6a4a">
    <path d="M0 -26 L8 -8 L26 -8 L12 4 L18 24 L0 12 L-18 24 L-12 4 L-26 -8 L-8 -8 Z"/>
  </g>
</svg>
