<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky09" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a1a4a"/>
      <stop offset="0.35" stop-color="#7a3a6a"/>
      <stop offset="0.65" stop-color="#d4624a"/>
      <stop offset="0.85" stop-color="#f0964a"/>
      <stop offset="1" stop-color="#fbd08a"/>
    </linearGradient>
    <radialGradient id="sun09" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff0c0"/><stop offset="0.4" stop-color="#ffb86a" stop-opacity="0.7"/><stop offset="1" stop-color="#ffb86a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="mesa09a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8a4a5a"/><stop offset="1" stop-color="#6a3448"/>
    </linearGradient>
    <linearGradient id="mesa09b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a85a48"/><stop offset="1" stop-color="#7a3a32"/>
    </linearGradient>
    <linearGradient id="mesa09c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c06a44"/><stop offset="1" stop-color="#8a3e28"/>
    </linearGradient>
    <linearGradient id="mesa09d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a2a26"/><stop offset="1" stop-color="#3a1a18"/>
    </linearGradient>
    <linearGradient id="river09" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6c98a"/><stop offset="1" stop-color="#c4783a"/>
    </linearGradient>
    <filter id="haze09" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="18"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky09)"/>

  <!-- stars -->
  <g fill="#fff" opacity="0.8">
    <circle cx="120" cy="60" r="1.5"/><circle cx="320" cy="100" r="1.2"/><circle cx="200" cy="160" r="1"/>
    <circle cx="500" cy="60" r="1.3"/><circle cx="60" cy="120" r="1.2"/><circle cx="420" cy="180" r="1"/>
  </g>

  <!-- sun -->
  <circle cx="820" cy="420" r="260" fill="url(#sun09)"/>
  <circle cx="820" cy="430" r="64" fill="#fff2cc"/>

  <!-- far mesas -->
  <path d="M0 470 L180 470 L200 420 L360 420 L380 470 L600 470 L600 600 L0 600 Z" fill="url(#mesa09a)" opacity="0.6" filter="url(#haze09)"/>
  <path d="M1000 460 L1180 460 L1200 410 L1360 410 L1380 460 L1600 460 L1600 600 L1000 600 Z" fill="url(#mesa09a)" opacity="0.6" filter="url(#haze09)"/>

  <!-- mid mesas -->
  <path d="M0 560 L120 560 L140 500 L300 500 L320 560 L0 560 Z M0 560 L0 700 L420 700 L420 560 Z" fill="url(#mesa09b)" opacity="0.85"/>
  <path d="M1080 540 L1240 540 L1260 480 L1440 480 L1460 540 L1600 540 L1600 700 L1080 700 Z" fill="url(#mesa09b)" opacity="0.85"/>

  <!-- big foreground mesas framing the canyon -->
  <path d="M0 620 L260 620 L290 540 L460 540 L490 620 L560 620 L560 1000 L0 1000 Z" fill="url(#mesa09c)"/>
  <path d="M1040 620 L1100 620 L1130 540 L1320 540 L1350 620 L1600 620 L1600 1000 L1040 1000 Z" fill="url(#mesa09c)"/>
  <!-- strata lines -->
  <g stroke="#7a3422" stroke-width="3" opacity="0.4">
    <line x1="20" y1="700" x2="540" y2="700"/><line x1="40" y1="780" x2="540" y2="780"/><line x1="20" y1="860" x2="540" y2="860"/>
    <line x1="1060" y1="700" x2="1580" y2="700"/><line x1="1060" y1="780" x2="1580" y2="780"/><line x1="1060" y1="860" x2="1580" y2="860"/>
  </g>

  <!-- canyon floor -->
  <path d="M560 620 L1040 620 L1040 1000 L560 1000 Z" fill="url(#mesa09d)"/>

  <!-- winding river catching light -->
  <path d="M800 620 Q780 720 820 760 Q870 800 800 860 Q740 910 800 1000 L880 1000 Q840 910 900 860 Q960 810 900 760 Q860 720 880 620 Z" fill="url(#river09)" opacity="0.9"/>
  <path d="M820 700 Q800 780 840 840" stroke="#fff0d0" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- saguaro cacti -->
  <g fill="#2a3a1a">
    <g transform="translate(660 700)">
      <rect x="-12" y="0" width="24" height="200" rx="12"/>
      <path d="M-12 60 q-40 0 -40 40 l0 30 q0 12 12 12 q12 0 12 -12 l0 -50" fill="#2a3a1a"/>
      <path d="M12 90 q40 0 40 40 l0 24 q0 12 12 12 q12 0 12 -12 l0 -44" fill="#2a3a1a"/>
    </g>
    <g transform="translate(960 740) scale(0.8)">
      <rect x="-12" y="0" width="24" height="200" rx="12"/>
      <path d="M12 70 q40 0 40 40 l0 30 q0 12 12 12 q12 0 12 -12 l0 -50" fill="#2a3a1a"/>
    </g>
    <g transform="translate(180 880) scale(0.7)">
      <rect x="-12" y="0" width="24" height="160" rx="12"/>
      <path d="M-12 50 q-36 0 -36 36 l0 24 q0 12 12 12 q12 0 12 -12 l0 -44" fill="#2a3a1a"/>
    </g>
    <g transform="translate(1420 860) scale(0.75)">
      <rect x="-12" y="0" width="24" height="170" rx="12"/>
      <path d="M12 60 q36 0 36 36 l0 24 q0 12 12 12 q12 0 12 -12 l0 -44" fill="#2a3a1a"/>
    </g>
  </g>

  <!-- foreground rocks -->
  <g fill="#2a1614">
    <ellipse cx="700" cy="980" rx="80" ry="30"/><ellipse cx="920" cy="990" rx="70" ry="26"/>
  </g>

  <!-- birds -->
  <g stroke="#3a1a1a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M500 240 q12 -10 24 0 q12 -10 24 0"/><path d="M1100 200 q10 -8 20 0 q10 -8 20 0"/>
  </g>
</svg>
