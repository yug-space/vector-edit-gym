<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cfe8d0"/><stop offset="1" stop-color="#e8f0c8"/>
    </linearGradient>
    <linearGradient id="fall14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eafdff"/><stop offset="0.6" stop-color="#bfe8f0"/><stop offset="1" stop-color="#8fd0e0"/>
    </linearGradient>
    <linearGradient id="pool14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fd0c8"/><stop offset="1" stop-color="#2a8a7a"/>
    </linearGradient>
    <linearGradient id="rock14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7a8a6a"/><stop offset="1" stop-color="#4a5a3a"/>
    </linearGradient>
    <linearGradient id="stone14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#a8a89a"/><stop offset="1" stop-color="#787868"/>
    </linearGradient>
    <filter id="mist14" x="-50%" y="-50%" width="200%" height="200%"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky14)"/>

  <!-- distant canopy layers -->
  <g filter="url(#mist14)">
    <ellipse cx="200" cy="160" rx="360" ry="180" fill="#6a9a5a" opacity="0.7"/>
    <ellipse cx="800" cy="120" rx="420" ry="180" fill="#5a8a4a" opacity="0.7"/>
    <ellipse cx="1400" cy="160" rx="360" ry="180" fill="#6a9a5a" opacity="0.7"/>
  </g>

  <!-- cliff faces -->
  <path d="M0 0 L0 720 Q120 700 240 720 L320 200 Q280 80 200 60 L0 40 Z" fill="url(#rock14)"/>
  <path d="M1600 0 L1600 720 Q1480 700 1360 720 L1280 200 Q1320 80 1400 60 L1600 40 Z" fill="url(#rock14)"/>
  <!-- back cliff -->
  <path d="M460 180 L1140 180 L1180 700 L420 700 Z" fill="#3a4a2e"/>

  <!-- waterfall (multi-strand) -->
  <g>
    <rect x="660" y="180" width="280" height="560" fill="url(#fall14)"/>
    <g stroke="#ffffff" stroke-width="4" opacity="0.6">
      <line x1="700" y1="200" x2="700" y2="720"/><line x1="740" y1="200" x2="738" y2="720"/><line x1="800" y1="200" x2="800" y2="720"/>
      <line x1="860" y1="200" x2="862" y2="720"/><line x1="900" y1="200" x2="900" y2="720"/>
    </g>
    <!-- second smaller fall -->
    <rect x="980" y="280" width="80" height="420" fill="url(#fall14)" opacity="0.85"/>
    <line x1="1020" y1="290" x2="1020" y2="680" stroke="#ffffff" stroke-width="3" opacity="0.6"/>
  </g>

  <!-- lost temple ruins -->
  <g transform="translate(420 480)">
    <!-- stepped pyramid -->
    <polygon points="0,200 360,200 320,150 40,150" fill="url(#stone14)"/>
    <polygon points="40,150 320,150 290,108 70,108" fill="#9a9a8a"/>
    <polygon points="70,108 290,108 264,70 96,70" fill="#8a8a7a"/>
    <polygon points="96,70 264,70 240,40 120,40" fill="#9a9a8a"/>
    <!-- doorway -->
    <rect x="160" y="120" width="44" height="80" fill="#2a3022"/>
    <polygon points="158,120 206,120 182,96" fill="#3a4030"/>
    <!-- weathered cracks -->
    <g stroke="#5a5a4a" stroke-width="2" opacity="0.5"><line x1="60" y1="160" x2="100" y2="190"/><line x1="280" y1="120" x2="300" y2="150"/></g>
  </g>
  <!-- broken pillars -->
  <g fill="url(#stone14)">
    <rect x="300" y="640" width="40" height="120"/><rect x="296" y="632" width="48" height="12"/>
    <rect x="1240" y="660" width="40" height="100"/><rect x="1236" y="652" width="48" height="12"/>
    <rect x="1180" y="700" width="36" height="60"/>
  </g>

  <!-- vines on ruins and cliffs -->
  <g stroke="#3a6a2a" stroke-width="4" fill="none" opacity="0.85">
    <path d="M460 480 Q440 540 470 600 Q500 660 460 720"/>
    <path d="M700 480 Q720 540 690 600"/>
    <path d="M40 200 Q70 300 40 400 Q20 500 50 600"/>
    <path d="M1560 200 Q1530 300 1560 400 Q1580 500 1550 600"/>
  </g>
  <g fill="#4a8a3a" opacity="0.85">
    <circle cx="468" cy="560" r="10"/><circle cx="462" cy="700" r="9"/><circle cx="46" cy="380" r="10"/><circle cx="1556" cy="380" r="10"/><circle cx="692" cy="560" r="9"/>
  </g>

  <!-- pool with ripples -->
  <ellipse cx="800" cy="820" rx="560" ry="120" fill="url(#pool14)"/>
  <g fill="none" stroke="#cffff0" stroke-width="2.5" opacity="0.6">
    <ellipse cx="800" cy="760" rx="120" ry="22"/><ellipse cx="800" cy="800" rx="200" ry="34"/><ellipse cx="800" cy="850" rx="300" ry="44"/>
  </g>
  <!-- foreground foliage -->
  <g fill="#2a5a22">
    <path d="M0 1000 L0 880 Q120 820 200 880 Q160 940 80 960 Q40 980 0 1000 Z"/>
    <path d="M1600 1000 L1600 880 Q1480 820 1400 880 Q1440 940 1520 960 Q1560 980 1600 1000 Z"/>
  </g>
  <!-- big leaves -->
  <g fill="#3a7a2a">
    <path d="M120 980 Q60 900 120 840 Q180 900 120 980 Z"/><line x1="120" y1="980" x2="120" y2="850" stroke="#2a5a1a" stroke-width="2"/>
    <path d="M220 1000 Q160 920 220 860 Q280 920 220 1000 Z"/>
    <path d="M1480 980 Q1420 900 1480 840 Q1540 900 1480 980 Z"/><line x1="1480" y1="980" x2="1480" y2="850" stroke="#2a5a1a" stroke-width="2"/>
    <path d="M1380 1000 Q1320 920 1380 860 Q1440 920 1380 1000 Z"/>
  </g>

  <!-- mist at base of falls -->
  <ellipse cx="800" cy="730" rx="280" ry="70" fill="#ffffff" opacity="0.5" filter="url(#mist14)"/>

  <!-- exotic birds (macaws) -->
  <g transform="translate(420 360)">
    <ellipse cx="0" cy="0" rx="22" ry="12" fill="#e03a2a"/><circle cx="18" cy="-6" r="8" fill="#e03a2a"/>
    <polygon points="-18,0 -56,-8 -40,4 -56,12" fill="#2a6ad0"/><polygon points="-10,6 -30,28 -4,16" fill="#f0c83a"/>
    <circle cx="22" cy="-8" r="2" fill="#fff"/><path d="M26 -6 q8 0 8 6" stroke="#3a3a3a" stroke-width="3" fill="none"/>
  </g>
  <g transform="translate(1180 320) scale(0.8)">
    <ellipse cx="0" cy="0" rx="22" ry="12" fill="#f0c83a"/><circle cx="-18" cy="-6" r="8" fill="#f0c83a"/>
    <polygon points="18,0 56,-8 40,4 56,12" fill="#2a9a4a"/><polygon points="10,6 30,28 4,16" fill="#2a6ad0"/>
    <circle cx="-22" cy="-8" r="2" fill="#fff"/>
  </g>
  <!-- small birds flying -->
  <g stroke="#3a3a3a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M760 240 q10 -8 20 0 q10 -8 20 0"/><path d="M840 280 q9 -7 18 0 q9 -7 18 0"/>
  </g>
</svg>
