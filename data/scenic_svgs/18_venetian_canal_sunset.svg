<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f0a85a"/>
      <stop offset="0.4" stop-color="#f6c478"/>
      <stop offset="0.75" stop-color="#f8dca0"/>
      <stop offset="1" stop-color="#fbeccb"/>
    </linearGradient>
    <radialGradient id="sun18" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fffae8"/><stop offset="0.5" stop-color="#ffe0a0" stop-opacity="0.7"/><stop offset="1" stop-color="#ffe0a0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="waterTop18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8b878"/><stop offset="0.5" stop-color="#c89060"/><stop offset="1" stop-color="#7a6a6a"/>
    </linearGradient>
    <linearGradient id="bldgL18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d4986a"/><stop offset="1" stop-color="#a86a4a"/>
    </linearGradient>
    <linearGradient id="bldgR18" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c88a8a"/><stop offset="1" stop-color="#9a5a5a"/>
    </linearGradient>
    <filter id="refl18" x="-20%" y="-20%" width="140%" height="140%"><feGaussianBlur stdDeviation="3"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky18)"/>
  <circle cx="800" cy="380" r="320" fill="url(#sun18)"/>
  <circle cx="800" cy="380" r="74" fill="#fff8e6"/>

  <!-- soft clouds -->
  <g fill="#ffe2c0" opacity="0.6"><ellipse cx="300" cy="160" rx="200" ry="34"/><ellipse cx="1280" cy="220" rx="220" ry="38"/></g>

  <!-- left buildings -->
  <g>
    <polygon points="0,160 360,200 360,640 0,640" fill="url(#bldgL18)"/>
    <polygon points="0,160 360,200 360,230 0,196" fill="#8a5238"/>
    <!-- roofline detail -->
    <g fill="#7a4830"><rect x="20" y="200" width="60" height="14"/><rect x="120" y="210" width="60" height="14"/><rect x="240" y="220" width="60" height="14"/></g>
    <!-- windows (arched) -->
    <g fill="#5a3424">
      <rect x="40" y="280" width="40" height="70"/><rect x="140" y="290" width="40" height="70"/><rect x="240" y="300" width="40" height="70"/>
      <rect x="40" y="400" width="40" height="70"/><rect x="140" y="410" width="40" height="70"/><rect x="240" y="420" width="40" height="70"/>
      <rect x="40" y="520" width="40" height="70"/><rect x="140" y="530" width="40" height="70"/><rect x="240" y="540" width="40" height="70"/>
    </g>
    <g fill="#a86a4a"><path d="M40 280 a20 20 0 0 1 40 0 Z"/><path d="M140 290 a20 20 0 0 1 40 0 Z"/><path d="M240 300 a20 20 0 0 1 40 0 Z"/></g>
    <!-- glowing windows -->
    <rect x="140" y="410" width="40" height="70" fill="#ffd27a" opacity="0.8"/><rect x="40" y="520" width="40" height="70" fill="#ffd27a" opacity="0.8"/>
  </g>

  <!-- right buildings -->
  <g>
    <polygon points="1600,140 1240,200 1240,640 1600,640" fill="url(#bldgR18)"/>
    <polygon points="1600,140 1240,200 1240,230 1600,176" fill="#7a4040"/>
    <g fill="#6a3838"><rect x="1520" y="200" width="60" height="14"/><rect x="1420" y="210" width="60" height="14"/><rect x="1300" y="222" width="60" height="14"/></g>
    <g fill="#5a3030">
      <rect x="1520" y="280" width="40" height="70"/><rect x="1420" y="290" width="40" height="70"/><rect x="1320" y="300" width="40" height="70"/>
      <rect x="1520" y="400" width="40" height="70"/><rect x="1420" y="410" width="40" height="70"/><rect x="1320" y="420" width="40" height="70"/>
      <rect x="1520" y="520" width="40" height="70"/><rect x="1420" y="530" width="40" height="70"/><rect x="1320" y="540" width="40" height="70"/>
    </g>
    <g fill="#9a5a5a"><path d="M1520 280 a20 20 0 0 1 40 0 Z"/><path d="M1420 290 a20 20 0 0 1 40 0 Z"/><path d="M1320 300 a20 20 0 0 1 40 0 Z"/></g>
    <rect x="1420" y="410" width="40" height="70" fill="#ffd27a" opacity="0.8"/><rect x="1520" y="520" width="40" height="70" fill="#ffd27a" opacity="0.8"/>
  </g>

  <!-- arched bridge across the canal -->
  <g transform="translate(560 470)">
    <path d="M0 160 Q240 -40 480 160 L480 200 Q240 20 0 200 Z" fill="#cbb088"/>
    <path d="M0 160 Q240 -40 480 160" fill="none" stroke="#9a8060" stroke-width="4"/>
    <!-- balustrade -->
    <g stroke="#a8906a" stroke-width="5"><line x1="60" y1="118" x2="60" y2="80"/><line x1="150" y1="58" x2="150" y2="20"/><line x1="240" y1="38" x2="240" y2="0"/><line x1="330" y1="58" x2="330" y2="20"/><line x1="420" y1="118" x2="420" y2="80"/></g>
    <path d="M50 80 Q240 -70 430 80" fill="none" stroke="#bca078" stroke-width="6"/>
  </g>

  <!-- water -->
  <rect x="0" y="640" width="1600" height="360" fill="url(#waterTop18)"/>

  <!-- building reflections -->
  <g opacity="0.4" filter="url(#refl18)">
    <polygon points="0,640 360,640 360,860 0,800" fill="#a8694a"/>
    <polygon points="1600,640 1240,640 1240,860 1600,820" fill="#9a5656"/>
    <rect x="140" y="700" width="40" height="60" fill="#ffd27a"/><rect x="1420" y="700" width="40" height="60" fill="#ffd27a"/>
  </g>
  <!-- sun glitter path -->
  <g fill="#fff4d8" opacity="0.6">
    <ellipse cx="800" cy="680" rx="80" ry="6"/><ellipse cx="800" cy="720" rx="120" ry="7"/><ellipse cx="800" cy="770" rx="160" ry="8"/><ellipse cx="800" cy="830" rx="200" ry="9"/>
  </g>
  <g stroke="#fff" stroke-width="1.2" opacity="0.25">
    <line x1="100" y1="700" x2="1500" y2="700"/><line x1="60" y1="780" x2="1540" y2="780"/><line x1="20" y1="880" x2="1580" y2="880"/>
  </g>

  <!-- mooring poles -->
  <g fill="#6a4a3a"><rect x="380" y="640" width="12" height="140" rx="4"/><rect x="1200" y="640" width="12" height="150" rx="4"/><rect x="520" y="700" width="10" height="120" rx="4"/></g>

  <!-- gondolas -->
  <g>
    <g transform="translate(560 760)">
      <path d="M-140 0 Q-150 30 -110 36 L110 36 Q150 30 140 0 Q60 24 -60 24 Q-110 22 -140 0 Z" fill="#1a1a1a"/>
      <path d="M-140 0 Q-200 -20 -210 -50" stroke="#1a1a1a" stroke-width="6" fill="none"/>
      <path d="M140 0 Q190 -10 196 -34" stroke="#1a1a1a" stroke-width="6" fill="none"/>
      <rect x="-30" y="-18" width="60" height="20" rx="4" fill="#6a1a1a"/>
      <!-- gondolier -->
      <g transform="translate(90 -10)"><rect x="-4" y="-40" width="8" height="40" fill="#2a2a2a"/><circle cx="0" cy="-46" r="7" fill="#e8c9a0"/><line x1="0" y1="-30" x2="40" y2="-70" stroke="#5a3a1a" stroke-width="3"/></g>
    </g>
    <g transform="translate(1040 820) scale(0.9)">
      <path d="M-140 0 Q-150 30 -110 36 L110 36 Q150 30 140 0 Q60 24 -60 24 Q-110 22 -140 0 Z" fill="#161616"/>
      <path d="M-140 0 Q-200 -20 -210 -50" stroke="#161616" stroke-width="6" fill="none"/>
      <path d="M140 0 Q190 -10 196 -34" stroke="#161616" stroke-width="6" fill="none"/>
      <rect x="-30" y="-18" width="60" height="20" rx="4" fill="#1a3a5a"/>
      <g transform="translate(90 -10)"><rect x="-4" y="-40" width="8" height="40" fill="#2a2a2a"/><circle cx="0" cy="-46" r="7" fill="#e8c9a0"/><line x1="0" y1="-30" x2="40" y2="-70" stroke="#5a3a1a" stroke-width="3"/></g>
    </g>
  </g>

  <!-- birds -->
  <g stroke="#6a4a3a" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M400 200 q12 -10 24 0 q12 -10 24 0"/><path d="M1100 160 q10 -8 20 0 q10 -8 20 0"/>
  </g>
</svg>
