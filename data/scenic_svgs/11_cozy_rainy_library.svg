<svg viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="wall11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4a2f22"/><stop offset="1" stop-color="#3a2418"/>
    </linearGradient>
    <linearGradient id="floor11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6a4428"/><stop offset="1" stop-color="#4a2e18"/>
    </linearGradient>
    <radialGradient id="lamp11" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe7a8" stop-opacity="0.9"/><stop offset="1" stop-color="#ffe7a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="fire11" cx="0.5" cy="0.6" r="0.5">
      <stop offset="0" stop-color="#ffd06a"/><stop offset="0.5" stop-color="#ff8a3a"/><stop offset="1" stop-color="#c0401a"/>
    </radialGradient>
    <linearGradient id="rain11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a5a72"/><stop offset="1" stop-color="#1a3448"/>
    </linearGradient>
    <filter id="glow11" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="20"/></filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#wall11)"/>
  <!-- warm ambient glow -->
  <ellipse cx="1180" cy="500" rx="500" ry="500" fill="url(#lamp11)" opacity="0.5"/>
  <ellipse cx="300" cy="720" rx="320" ry="280" fill="url(#fire11)" opacity="0.25" filter="url(#glow11)"/>

  <!-- floor -->
  <rect x="0" y="820" width="1600" height="180" fill="url(#floor11)"/>
  <g stroke="#3a2414" stroke-width="2" opacity="0.5">
    <line x1="0" y1="870" x2="1600" y2="870"/><line x1="0" y1="930" x2="1600" y2="930"/>
    <line x1="200" y1="820" x2="160" y2="1000"/><line x1="600" y1="820" x2="580" y2="1000"/><line x1="1000" y1="820" x2="1020" y2="1000"/><line x1="1400" y1="820" x2="1440" y2="1000"/>
  </g>
  <!-- rug -->
  <ellipse cx="800" cy="930" rx="420" ry="60" fill="#7a3030"/>
  <ellipse cx="800" cy="930" rx="380" ry="50" fill="none" stroke="#d4a04a" stroke-width="4"/>

  <!-- left bookshelves -->
  <g transform="translate(60 120)">
    <rect x="0" y="0" width="380" height="700" fill="#2e1d10"/>
    <g>
      <!-- shelves -->
      <rect x="0" y="0" width="380" height="14" fill="#1f1409"/>
      <rect x="0" y="170" width="380" height="14" fill="#1f1409"/><rect x="0" y="340" width="380" height="14" fill="#1f1409"/>
      <rect x="0" y="510" width="380" height="14" fill="#1f1409"/><rect x="0" y="686" width="380" height="14" fill="#1f1409"/>
    </g>
    <!-- books rows -->
    <g>
      <!-- row 1 -->
      <g>
        <rect x="16" y="40" width="22" height="130" fill="#b0452f"/><rect x="42" y="56" width="20" height="114" fill="#3a6a8a"/><rect x="66" y="44" width="24" height="126" fill="#caa04a"/>
        <rect x="94" y="60" width="18" height="110" fill="#5a7a3a"/><rect x="116" y="48" width="22" height="122" fill="#8a3a6a"/><rect x="142" y="56" width="20" height="114" fill="#c0612f"/>
        <rect x="166" y="44" width="24" height="126" fill="#3a8a7a"/><rect x="194" y="60" width="18" height="110" fill="#a04a4a"/><rect x="216" y="50" width="22" height="120" fill="#4a5a8a"/>
        <rect x="242" y="56" width="20" height="114" fill="#caa04a"/><rect x="266" y="44" width="24" height="126" fill="#6a3a8a"/><rect x="294" y="60" width="18" height="110" fill="#3a7a5a"/><rect x="316" y="48" width="22" height="122" fill="#b0452f"/><rect x="342" y="56" width="20" height="114" fill="#8a6a3a"/>
      </g>
      <!-- row 2 -->
      <g transform="translate(0 170)">
        <rect x="16" y="40" width="20" height="130" fill="#3a6a8a"/><rect x="40" y="56" width="24" height="114" fill="#caa04a"/><rect x="68" y="44" width="18" height="126" fill="#b0452f"/>
        <rect x="90" y="60" width="22" height="110" fill="#5a7a3a"/><rect x="116" y="48" width="20" height="122" fill="#8a3a6a"/><rect x="140" y="56" width="24" height="114" fill="#3a8a7a"/>
        <rect x="168" y="44" width="18" height="126" fill="#c0612f"/><rect x="190" y="60" width="22" height="110" fill="#4a5a8a"/><rect x="216" y="50" width="20" height="120" fill="#a04a4a"/>
        <rect x="240" y="56" width="24" height="114" fill="#6a3a8a"/><rect x="268" y="44" width="18" height="126" fill="#caa04a"/><rect x="290" y="60" width="22" height="110" fill="#3a7a5a"/><rect x="316" y="48" width="20" height="122" fill="#b0452f"/><rect x="340" y="56" width="22" height="114" fill="#8a6a3a"/>
      </g>
      <!-- row 3 -->
      <g transform="translate(0 340)">
        <rect x="16" y="40" width="22" height="130" fill="#caa04a"/><rect x="42" y="56" width="18" height="114" fill="#b0452f"/><rect x="64" y="44" width="24" height="126" fill="#3a6a8a"/>
        <rect x="92" y="60" width="20" height="110" fill="#8a3a6a"/><rect x="116" y="48" width="22" height="122" fill="#5a7a3a"/><rect x="142" y="56" width="20" height="114" fill="#c0612f"/>
        <rect x="166" y="44" width="24" height="126" fill="#4a5a8a"/><rect x="194" y="60" width="18" height="110" fill="#3a8a7a"/><rect x="216" y="50" width="22" height="120" fill="#6a3a8a"/>
        <rect x="242" y="56" width="20" height="114" fill="#a04a4a"/><rect x="266" y="44" width="24" height="126" fill="#caa04a"/><rect x="294" y="60" width="18" height="110" fill="#b0452f"/><rect x="316" y="48" width="22" height="122" fill="#3a7a5a"/><rect x="342" y="56" width="20" height="114" fill="#8a6a3a"/>
      </g>
      <!-- row 4 -->
      <g transform="translate(0 510)">
        <rect x="16" y="40" width="20" height="130" fill="#b0452f"/><rect x="40" y="56" width="24" height="114" fill="#3a6a8a"/><rect x="68" y="44" width="18" height="126" fill="#caa04a"/>
        <rect x="90" y="60" width="22" height="110" fill="#8a3a6a"/><rect x="116" y="48" width="20" height="122" fill="#5a7a3a"/><rect x="140" y="56" width="24" height="114" fill="#c0612f"/>
        <rect x="168" y="44" width="18" height="126" fill="#3a8a7a"/><rect x="190" y="60" width="22" height="110" fill="#4a5a8a"/><rect x="216" y="50" width="20" height="120" fill="#a04a4a"/>
        <rect x="240" y="56" width="24" height="114" fill="#6a3a8a"/><rect x="268" y="44" width="18" height="126" fill="#caa04a"/><rect x="290" y="60" width="22" height="110" fill="#3a7a5a"/><rect x="316" y="48" width="20" height="122" fill="#b0452f"/><rect x="340" y="56" width="22" height="114" fill="#8a6a3a"/>
      </g>
    </g>
  </g>

  <!-- rolling ladder -->
  <g stroke="#caa04a" stroke-width="6" opacity="0.9">
    <line x1="300" y1="140" x2="340" y2="800"/><line x1="360" y1="140" x2="400" y2="800"/>
    <line x1="306" y1="240" x2="378" y2="240"/><line x1="312" y1="340" x2="384" y2="340"/><line x1="318" y1="440" x2="390" y2="440"/><line x1="324" y1="540" x2="396" y2="540"/><line x1="330" y1="640" x2="402" y2="640"/>
  </g>

  <!-- right: fireplace -->
  <g transform="translate(560 560)">
    <rect x="0" y="0" width="240" height="260" fill="#2a1a10"/>
    <rect x="-16" y="-20" width="272" height="30" fill="#3a2414"/>
    <rect x="30" y="60" width="180" height="200" fill="#1a0f08"/>
    <ellipse cx="120" cy="220" rx="80" ry="50" fill="url(#fire11)"/>
    <path d="M120 230 Q100 170 120 130 Q140 170 130 200 Q150 160 150 210 Q150 240 120 250 Q90 244 90 210 Q90 170 110 200 Z" fill="#ffd86a"/>
    <!-- logs -->
    <rect x="60" y="250" width="120" height="10" rx="5" fill="#5a3a1a"/><rect x="76" y="240" width="100" height="10" rx="5" fill="#6a4424"/>
  </g>

  <!-- window with rain -->
  <g transform="translate(960 160)">
    <rect x="-20" y="-20" width="400" height="540" fill="#5a3a22"/>
    <rect x="0" y="0" width="360" height="500" fill="url(#rain11)"/>
    <line x1="180" y1="0" x2="180" y2="500" stroke="#5a3a22" stroke-width="14"/>
    <line x1="0" y1="250" x2="360" y2="250" stroke="#5a3a22" stroke-width="14"/>
    <!-- rain streaks -->
    <g stroke="#9fc4dc" stroke-width="1.6" opacity="0.5">
      <line x1="40" y1="20" x2="30" y2="80"/><line x1="100" y1="60" x2="90" y2="120"/><line x1="140" y1="20" x2="130" y2="80"/>
      <line x1="220" y1="40" x2="210" y2="100"/><line x1="300" y1="20" x2="290" y2="80"/><line x1="60" y1="280" x2="50" y2="340"/>
      <line x1="200" y1="300" x2="190" y2="360"/><line x1="320" y1="280" x2="310" y2="340"/><line x1="120" y1="380" x2="110" y2="440"/><line x1="280" y1="400" x2="270" y2="460"/>
    </g>
    <!-- moon glow outside -->
    <circle cx="280" cy="120" r="50" fill="#cdd8e8" opacity="0.3" filter="url(#glow11)"/>
  </g>

  <!-- armchair -->
  <g transform="translate(1080 700)">
    <rect x="-90" y="-60" width="180" height="120" rx="20" fill="#7a3a3a"/>
    <rect x="-110" y="-20" width="40" height="120" rx="16" fill="#6a3030"/>
    <rect x="70" y="-20" width="40" height="120" rx="16" fill="#6a3030"/>
    <rect x="-70" y="-120" width="140" height="90" rx="20" fill="#8a4444"/>
    <ellipse cx="0" cy="-30" rx="60" ry="24" fill="#9a5050"/>
  </g>

  <!-- floor lamp -->
  <g transform="translate(1380 560)">
    <rect x="-4" y="0" width="8" height="260" fill="#3a2414"/>
    <ellipse cx="0" cy="260" rx="40" ry="12" fill="#2e1d10"/>
    <path d="M-50 0 L50 0 L36 -70 L-36 -70 Z" fill="#e8c878"/>
    <circle cx="0" cy="-30" r="120" fill="url(#lamp11)"/>
  </g>

  <!-- side table + cup -->
  <g transform="translate(940 760)">
    <rect x="-30" y="0" width="60" height="60" fill="#3a2414"/>
    <rect x="-40" y="-8" width="80" height="10" fill="#4a2e18"/>
    <ellipse cx="0" cy="-12" rx="14" ry="6" fill="#d8c8b8"/><rect x="-14" y="-20" width="28" height="10" rx="3" fill="#e8dccc"/>
    <path d="M6 -18 Q6 -30 -2 -30" stroke="#d8c8b8" stroke-width="3" fill="none" opacity="0.6"/>
  </g>

  <!-- sleeping cat on rug -->
  <g transform="translate(720 928)">
    <ellipse cx="0" cy="0" rx="60" ry="24" fill="#2a2420"/>
    <ellipse cx="-48" cy="-6" rx="22" ry="18" fill="#2a2420"/>
    <polygon points="-58,-18 -50,-30 -44,-18" fill="#2a2420"/><polygon points="-44,-20 -38,-32 -32,-20" fill="#2a2420"/>
    <path d="M58 -4 Q90 -10 84 -28" stroke="#2a2420" stroke-width="14" fill="none" stroke-linecap="round"/>
    <path d="M-58 -8 q-6 -2 -10 0" stroke="#888" stroke-width="1.5"/>
  </g>
</svg>
