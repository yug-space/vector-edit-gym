name: Bug report
description: Report a reproducible evaluator, data, CLI, or viewer defect.
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Do not include API keys or private provider responses.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include the task ID, command, commit, and minimal output needed to reproduce it.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and Python/Node versions.
    validations:
      required: true
