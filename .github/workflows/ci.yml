name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.11"
          cache: pip
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            viewer/package-lock.json
      - name: Install Python package
        run: python -m pip install -e 'sdk/python[test,analysis]'
      - name: Install Node dependencies
        run: |
          npm ci
          npm --prefix viewer ci
      - name: Verify frozen corpus
        run: npm run corpus:verify
      - name: Verify published traces
        run: npm run traces:verify
      - name: Test evaluator
        run: npm run test:sdk
      - name: Type-check viewer
        run: npm run viewer:lint
      - name: Build viewer
        run: npm run viewer:build
